<!-- Step 2: TMDB ID input -->
<div class="wizard-section">
  <h2 class="wizard-title">Ricerca TMDB</h2>
  <p class="wizard-subtitle">Inserisci l'ID TMDB per recuperare titolo ufficiale e anno.</p>

  {% if tmdb_error %}
  <div class="alert alert-error">{{ tmdb_error }}</div>
  {% endif %}

  <form
    hx-post="{{ root_path }}/wizard/{{ token }}/tmdb"
    hx-target="#wizard-content"
    hx-swap="innerHTML"
    hx-indicator="#tmdb-spinner"
  >
    <div class="form-row">
      <div class="form-group flex-1">
        <label for="tmdb_id">TMDB ID</label>
        <input
          type="text"
          id="tmdb_id"
          name="tmdb_id"
          placeholder="es. 335984"
          value="{{ state.tmdb_id or '' }}"
          required
          autofocus
        >
        <span class="form-hint">
          Cerca su <a href="https://www.themoviedb.org" target="_blank" rel="noopener">themoviedb.org</a>
        </span>
      </div>
      <div class="form-group">
        <label for="tmdb_kind">Tipo</label>
        <select name="tmdb_kind" id="tmdb_kind">
          {% set preselect_tv = state.get('tmdb_kind') == 'tv' or (not state.get('tmdb_kind') and state.kind in ['series', 'episode']) %}
          {% if preselect_tv %}
          <option value="tv" selected>TV / Serie</option>
          <option value="movie">Film</option>
          {% else %}
          <option value="movie" selected>Film</option>
          <option value="tv">TV / Serie</option>
          {% endif %}
        </select>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">
      Cerca <span id="tmdb-spinner" class="htmx-indicator mono">…</span>
    </button>
  </form>
</div>
