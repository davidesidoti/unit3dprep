<!-- Step 5: Launch unit3dup with live log -->
<div id="stepper" hx-swap-oob="true" class="stepper">
  <div class="step done"><span class="step-num">1</span><span class="step-label">Audio</span></div>
  <div class="step-line"></div>
  <div class="step done"><span class="step-num">2</span><span class="step-label">TMDB</span></div>
  <div class="step-line"></div>
  <div class="step done"><span class="step-num">3</span><span class="step-label">Nomi</span></div>
  <div class="step-line"></div>
  <div class="step done"><span class="step-num">4</span><span class="step-label">Hardlink</span></div>
  <div class="step-line"></div>
  <div class="step active"><span class="step-num">5</span><span class="step-label">Upload</span></div>
</div>

{% if errors %}
<div class="alert alert-error">
  {% for e in errors %}
  <div>❌ {{ e }}</div>
  {% endfor %}
</div>
{% else %}
<h2 class="wizard-title">Upload su ItaTorrents</h2>
<p class="wizard-subtitle">
  Hardlink creato in <code class="mono">{{ seeding_path }}</code>
</p>

<div class="info-box">
  <strong>Pronto per l'upload.</strong> Clicca per avviare <code>unit3dup</code>.
</div>

<button id="upload-btn" class="btn btn-primary mt-4" onclick="startUpload()">
  🚀 Avvia Upload
</button>

<div id="upload-log" class="log-box" style="display:none"></div>

<div id="stdin-input-area" style="display:none" class="stdin-prompt-box">
  <div id="stdin-prompt-text" class="stdin-prompt-label"></div>
  <div class="stdin-prompt-row">
    <input id="stdin-value" type="text" class="stdin-input" placeholder="0 = skip">
    <button onclick="submitStdin()" class="btn btn-primary btn-sm">Invia</button>
  </div>
  <div class="stdin-prompt-hint">Inserisci ID numerico oppure 0 per saltare.</div>
</div>

<div id="upload-result"></div>

<script>
(function() {
  const token = {{ token | tojson }};
  const rootPath = {{ root_path | tojson }};
  const prefillTmdbId = {{ (state.tmdb_id or '') | tojson }};
  var _src = null;

  window.startUpload = function() {
    document.getElementById('upload-btn').disabled = true;
    document.getElementById('upload-btn').textContent = '⏳ Uploading...';
    const logBox = document.getElementById('upload-log');
    logBox.style.display = 'block';

    _src = new EventSource(rootPath + '/wizard/' + token + '/stream/upload');

    _src.addEventListener('log', function(e) {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.textContent = e.data;
      logBox.appendChild(line);
      logBox.scrollTop = logBox.scrollHeight;
    });

    _src.addEventListener('input_needed', function(e) {
      // unit3dup is waiting for user input — show the inline prompt
      document.getElementById('stdin-prompt-text').textContent = e.data;
      const area = document.getElementById('stdin-input-area');
      area.style.display = 'block';
      const inp = document.getElementById('stdin-value');
      // Auto-fill TMDB ID if prompt is asking for it and we have one from cache
      const isTmdbPrompt = e.data && e.data.toLowerCase().indexOf('tmdb') !== -1;
      if (isTmdbPrompt && prefillTmdbId) {
        inp.value = prefillTmdbId;
        // Auto-submit after short delay so user can see it happening
        setTimeout(function() {
          if (area.style.display !== 'none') window.submitStdin();
        }, 800);
      } else {
        inp.value = '';
        inp.focus();
      }
      logBox.scrollTop = logBox.scrollHeight;
    });

    _src.addEventListener('done', function(e) {
      _src.close();
      document.getElementById('stdin-input-area').style.display = 'none';
      const d = JSON.parse(e.data);
      const res = document.getElementById('upload-result');
      if (d.exit_code === 0) {
        res.innerHTML = '<div class="alert alert-ok">✅ Upload completato con successo!</div>' +
          '<a href="' + rootPath + '/uploaded" class="btn btn-secondary mt-2">Vai a Caricati</a>';
      } else {
        res.innerHTML = '<div class="alert alert-error">❌ unit3dup ha restituito exit code ' + d.exit_code + '</div>';
      }
      document.getElementById('upload-btn').style.display = 'none';
    });

    _src.addEventListener('error', function(e) {
      _src.close();
      document.getElementById('stdin-input-area').style.display = 'none';
      document.getElementById('upload-result').innerHTML =
        '<div class="alert alert-error">❌ ' + (e.data || 'Errore SSE') + '</div>';
    });

    _src.onerror = function() { _src.close(); };
  };

  window.submitStdin = function() {
    const value = document.getElementById('stdin-value').value.trim() || '0';
    document.getElementById('stdin-input-area').style.display = 'none';
    fetch(rootPath + '/wizard/' + token + '/stdin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({value: value})
    });
  };

  // Allow Enter key in the input field
  document.addEventListener('DOMContentLoaded', function() {
    var inp = document.getElementById('stdin-value');
    if (inp) {
      inp.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') window.submitStdin();
      });
    }
  });
})();
</script>
{% endif %}
