<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ItaTorrents{% endblock %}</title>
  <link rel="stylesheet" href="{{ root_path }}/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="logo">
        <div class="logo-text">Ita<span class="brand-accent">Torrents</span></div>
        <div class="logo-version">seeding · web</div>
      </div>
      <ul class="nav-links">
        <li>
          <a href="{{ root_path }}/library/movies" class="{% if active == 'movies' %}active{% endif %}">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg></span>
            Movies
          </a>
        </li>
        <li>
          <a href="{{ root_path }}/library/series" class="{% if active == 'series' %}active{% endif %}">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg></span>
            Series
          </a>
        </li>
        <li>
          <a href="{{ root_path }}/library/anime" class="{% if active == 'anime' %}active{% endif %}">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.8H20l-5 3.6 1.9 5.8L12 14.6 7.1 18.2 9 12.4 4 8.8h6.1L12 3z"/></svg></span>
            Anime
          </a>
        </li>
        <li class="nav-divider"></li>
        <li>
          <a href="{{ root_path }}/uploaded" class="{% if active == 'uploaded' %}active{% endif %}">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
            Caricati
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <form action="{{ root_path }}/logout" method="post">
          <button type="submit" class="logout-btn">Logout</button>
        </form>
      </div>
    </nav>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
