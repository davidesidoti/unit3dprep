<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ItaTorrents{% endblock %}</title>
  <link rel="stylesheet" href="{{ root_path }}/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="logo">
        <span class="logo-icon">🎬</span>
        <span class="logo-text">ItaTorrents</span>
      </div>
      <ul class="nav-links">
        <li>
          <a href="{{ root_path }}/library/movies" class="{% if active == 'movies' %}active{% endif %}">
            <span class="nav-icon">🎬</span> Movies
          </a>
        </li>
        <li>
          <a href="{{ root_path }}/library/series" class="{% if active == 'series' %}active{% endif %}">
            <span class="nav-icon">📺</span> Series
          </a>
        </li>
        <li>
          <a href="{{ root_path }}/library/anime" class="{% if active == 'anime' %}active{% endif %}">
            <span class="nav-icon">🎌</span> Anime
          </a>
        </li>
        <li class="nav-divider"></li>
        <li>
          <a href="{{ root_path }}/uploaded" class="{% if active == 'uploaded' %}active{% endif %}">
            <span class="nav-icon">✅</span> Caricati
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <form action="{{ root_path }}/logout" method="post">
          <button type="submit" class="logout-btn">Logout</button>
        </form>
      </div>
    </nav>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
