name: Publish to PyPI

# Publishes the `unit3dprep` wheel + sdist to PyPI on every version tag.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored as a secret.
# One-time setup on PyPI: project settings → Publishing → add a GitHub publisher
#   owner: davidesidoti, repo: unit3dprep, workflow: publish-pypi.yml, environment: pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/unit3dprep
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify the frontend SPA is bundled in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(whl).namelist()
          spa = [n for n in names if n.startswith("unit3dprep/web/dist/")]
          if not spa:
              sys.exit("FAIL: frontend dist/ missing from the wheel — the web UI would be broken")
          print(f"OK: {len(spa)} SPA files bundled in {whl}")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
