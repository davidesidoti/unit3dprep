name: GitHub Release

# Creates the GitHub Release on each v* tag, with notes taken from the matching
# CHANGELOG.md section (## [X.Y.Z]). Runs alongside the PyPI and Docker Hub
# publish workflows — one tag publishes all three.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            index($0, "## [" v "]") == 1 { f = 1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- notes -----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s RELEASE_NOTES.md ]; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          fi
