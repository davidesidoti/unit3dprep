# unit3dprep — all-in-one Docker setup.
# Quick start:
#   1. cp config.env.example config.env   (then fill in the values)
#   2. docker compose build
#   3. docker compose up -d
#   4. open http://127.0.0.1:8765
# Full guide: docs/docker.md
#
# `version` is only needed by the legacy docker-compose v1 (the standalone
# Python tool); Compose v2 (`docker compose`) ignores it with a harmless notice.
version: "3.8"
services:
  unit3dprep:
    build: .
    image: unit3dprep:latest
    container_name: unit3dprep
    restart: unless-stopped

    # Published on loopback only. Put a TLS reverse proxy (Caddy/Traefik/nginx)
    # in front for remote access, and set U3DP_HTTPS_ONLY=1 in config.env.
    ports:
      - "127.0.0.1:8765:8765"

    # Secrets/config go here as LITERAL values (no shell expansion). The bcrypt
    # U3DP_PASSWORD_HASH contains '$' — env_file passes it verbatim, so you avoid
    # the '$$' escaping you'd need with ${VAR} interpolation in this YAML.
    # config.env also carries PUID/PGID: the uid/gid the stack runs as, so files
    # under ./data are owned by your host user (set them to `id -u`/`id -g`).
    env_file:
      - ./config.env

    # Single volume: config (.env), the JSON db, TMDB cache, media and seedings
    # all live under /data — one filesystem, so hardlinks work.
    volumes:
      - ./data:/data

    # ---------------------------------------------------------------------
    # External qBittorrent (host or another container)?
    # webup's /seed hands qBit the content path AS SEEN INSIDE THIS CONTAINER
    # (e.g. /srv/seedings/...). For qBit to find it, mount the host media and
    # seedings dirs at the SAME ABSOLUTE PATH here and point the app at them.
    # The host media + seedings dirs must be on the same filesystem (hardlinks).
    # Replace the `volumes:` block above with:
    #
    # volumes:
    #   - ./data:/data
    #   - /srv/media:/srv/media:ro
    #   - /srv/seedings:/srv/seedings
    # environment:
    #   U3DP_MEDIA_ROOT: /srv/media
    #   U3DP_SEEDINGS_DIR: /srv/seedings
    # ---------------------------------------------------------------------
